# Pen Homes — Penlabs Lighting Calculator
#
# Calculations persist client-side (browser localStorage), so no database is
# required to run the app. If a future feature needs cloud sync / user accounts,
# uncomment the `db` service and the `web.depends_on` / `web.environment` lines.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: penlabs-lighting-calculator
    container_name: penlabs-lighting
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # - DATABASE_URL=postgres://pen:pen@db:5432/penlighting
