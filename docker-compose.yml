# Pen Homes — Penlabs Lighting Calculator
#
# For self-hosting (production runs on Vercel + Prisma Postgres). The calculators
# and designer work fully client-side; only the saved pricing/market config needs
# the database. The client connects to Prisma Postgres via Accelerate, so set
# DATABASE_URL to your prisma+postgres:// URL.
#
# Provide secrets via your shell or a root `.env` file (compose substitutes them):
#   DATABASE_URL=...   AUTH_SECRET=...   ADMIN_PASSCODE=...
# Omit DATABASE_URL to run on the markets.ts defaults (admin saves disabled).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: penlabs-lighting-calculator
    container_name: penlabs-lighting
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=${DATABASE_URL:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - ADMIN_PASSCODE=${ADMIN_PASSCODE:-}

# To run a self-managed Postgres here instead of Prisma Postgres, you must also
# switch src/lib/prisma.ts to a driver adapter (@prisma/adapter-pg) with a direct
# postgres:// URL — Accelerate's prisma+postgres:// URL can't target this service.
